    <div class="header-text">
        <h1>Troubleshoot</h1>
        <p>Having Trouble? We’re Here to Help.</p>
        </div></div>
    </header>

    <main class="content">
        <h2>Troubleshooting Guide</h2>
<p>Select your problem to see step-by-step solution.</p>

<div class="problems">
    <button onclick="showSolution('video')" class="button-trouble">Video Not Playing</button>
    <button onclick="showSolution('booking')" class="button-trouble">Booking Not Working</button>
    <button onclick="showSolution('login')" class="button-trouble">Login Problem</button>
    <button onclick="showSolution('page')" class="button-trouble">Page Not Loading</button>
</div>

<div id="solutionBox"></div>

<script>
function showSolution(type){

    var solution = "";

    if(type === "video"){
        solution = `
        <h3>Video Not Playing</h3>
        <ol>
            <li>Check your internet connection.</li>
            <li>Refresh the page.</li>
            <li>Make sure your browser supports MP4 format.</li>
            <li>Clear browser cache.</li>
            <li>Try using Google Chrome.</li>
        </ol>`;
    }

    else if(type === "booking"){
        solution = `
        <h3>Booking Not Working</h3>
        <ol>
            <li>Make sure all fields are filled correctly.</li>
            <li>Check if date and time are selected.</li>
            <li>Ensure internet connection is stable.</li>
            <li>Refresh the booking page.</li>
            <li>Contact support if issue continues.</li>
        </ol>`;
    }

    else if(type === "login"){
        solution = `
        <h3>Login Problem</h3>
        <ol>
            <li>Check your email and password.</li>
            <li>Make sure Caps Lock is off.</li>
            <li>Click "Forgot Password" if needed.</li>
            <li>Clear browser cookies.</li>
            <li>Try again after refreshing.</li>
        </ol>`;
    }

    else if(type === "page"){
        solution = `
        <h3>Page Not Loading</h3>
        <ol>
            <li>Check internet connection.</li>
            <li>Refresh the page.</li>
            <li>Clear browser cache.</li>
            <li>Restart your browser.</li>
            <li>Try another browser.</li>
        </ol>`;
    }

    document.getElementById("solutionBox").innerHTML = solution;
}
</script>
    </main>

    </body>
    </html>
